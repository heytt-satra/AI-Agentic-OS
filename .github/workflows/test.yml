name: tests

# Reliability gate (MASTERPLAN Pillar 1): run the cargo test suite on every push
# and PR so a change can never silently break a capability. The agent-task eval
# (`jarvis eval`) needs an API key + a live machine, so it runs locally/manually;
# this gate covers the deterministic unit tests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Linux system libs for the cross-platform GUI deps (xcap screen capture,
      # enigo input, arboard clipboard, dbus). Without these the crate can't even
      # compile on a bare runner - it's an environment requirement, not a code bug.
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libdbus-1-dev libxdo-dev pkg-config \
            libpipewire-0.3-dev clang libclang-dev libdrm-dev libgbm-dev
      - name: cargo test
        run: cargo test --locked --verbose
